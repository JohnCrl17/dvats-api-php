<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVATS | Driver Portal</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        
        /* Verifying Overlay */
        #verifyingOverlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 9999; }
        .pulse-logo { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="verifyingOverlay" class="flex-col justify-center items-center text-white">
        <div class="relative mb-6">
            <img src="assets/logo.png" class="w-24 h-24 pulse-logo" onerror="this.src='https://ui-avatars.com/api/?name=DVATS&background=2563eb&color=fff'">
            <div class="absolute inset-0 w-24 h-24 rounded-full border-4 border-blue-500 border-t-transparent animate-spin"></div>
        </div>
        <h2 class="text-lg font-bold tracking-widest uppercase">Verifying</h2>
        <p class="text-slate-400 text-xs mt-1">Authenticating credentials...</p>
    </div>

    <div id="mainContainer" class="w-full max-w-[360px] transition-opacity duration-500">
        
        <div class="text-center mb-8">
            <img src="assets/logo.png" alt="Logo" 
                 onerror="this.src='https://ui-avatars.com/api/?name=DVATS&background=0f172a&color=fff'"
                 class="w-28 h-28 mx-auto drop-shadow-md">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tighter uppercase italic mt-2">DVATS</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Driver Portal</p>
        </div>

        <div class="glass-card p-6 rounded-3xl shadow-xl border border-slate-100">
            <div class="mb-5">
                <h2 class="text-xl font-bold text-slate-800">Welcome Back</h2>
                <p class="text-slate-500 text-xs font-medium">Sign in to access your portal.</p>
            </div>

            <form id="loginForm" class="space-y-4" onsubmit="showVerifying(event)">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">License Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400"><i class="fa-regular fa-id-badge"></i></span>
                        <input type="text" id="license_no" placeholder="e.g. N01-23-456789" required
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 outline-none text-sm font-semibold text-slate-700 transition-all">
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Password</label>
                        <button type="button" onclick="openForgotModal()" class="text-[10px] font-bold text-blue-600 hover:underline">Forgot?</button>
                    </div>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400"><i class="fa-solid fa-fingerprint"></i></span>
                        <input type="password" id="password" placeholder="••••••••" required
                            class="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 outline-none text-sm font-semibold text-slate-700 transition-all">
                        <button type="button" id="togglePass" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <i class="fa-regular fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3 mt-2 rounded-xl font-bold text-sm transition-all active:scale-[0.98]">
                    Sign In
                </button>
                
                <a href="https://unadroitly-nonthinking-lora.ngrok-free.dev/dvats_api/mobile-register/mobile_register.html" class="w-full block text-center border border-slate-200 hover:bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-sm transition-all">
                    Create Account
                </a>
            </form>
        </div>
        
        <p class="text-[10px] text-center text-slate-400 mt-6 uppercase tracking-widest font-bold">© 2026 DVATS System</p>
    </div>

    <div id="forgotModal"
        class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4"
        style="background: rgba(15,23,42,0.7); backdrop-filter: blur(6px);">
    
        <div class="bg-white w-full max-w-[360px] rounded-3xl shadow-2xl overflow-hidden"
            style="animation: slideUp 0.35s cubic-bezier(.22,.68,0,1.2);">
    
            <!-- TOP ACCENT BAR -->
            <div class="h-1 w-full bg-gradient-to-r from-blue-500 via-indigo-500 to-blue-400"></div>
    
            <div class="p-6">
    
                <!-- HEADER -->
                <div class="flex items-start justify-between mb-5">
                    <div>
                        <h3 class="font-extrabold text-lg text-slate-800 tracking-tight">Reset Password</h3>
                        <p class="text-xs text-slate-400 font-medium mt-0.5">Enter your license & email to receive OTP</p>
                    </div>
                    <button onclick="closeForgotModal(); resetForgotModal();"
                        class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition-all">
                        <i class="fas fa-times text-slate-400 text-xs"></i>
                    </button>
                </div>
    
                <!-- STEP 1 — License + Email -->
                <div class="space-y-3">
    
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fas fa-id-card text-slate-300 group-focus-within:text-blue-500 transition-colors text-sm"></i>
                        </div>
                        <input id="fp_license"
                            placeholder="License Number"
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all placeholder:text-slate-300">
                    </div>
    
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-slate-300 group-focus-within:text-blue-500 transition-colors text-sm"></i>
                        </div>
                        <input id="fp_email"
                            type="email"
                            placeholder="Registered Email"
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all placeholder:text-slate-300">
                    </div>
    
                    <button id="btnSendOTP" onclick="sendOTP()"
                        class="w-full bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white py-3 rounded-xl font-bold text-sm transition-all shadow-sm shadow-blue-200">
                        <span id="btnText">Send OTP</span>
                    </button>
                </div>
    
                <!-- STEP 2 — OTP + New Password (hidden by default) -->
                <div id="otpSection" class="hidden space-y-3 mt-4 pt-4 border-t border-slate-100">
    
                    <!-- Divider label -->
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">
                        Enter OTP & New Password
                    </p>
    
                    <!-- OTP Input -->
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fas fa-key text-slate-300 group-focus-within:text-indigo-500 transition-colors text-sm"></i>
                        </div>
                        <input id="fp_otp"
                            placeholder="6-digit OTP"
                            maxlength="6"
                            inputmode="numeric"
                            class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all tracking-widest placeholder:tracking-normal placeholder:text-slate-300">
                    </div>
    
                    <!-- New Password -->
                    <div class="relative group">
                        <input id="fp_newpass"
                            type="password"
                            placeholder="New Password (min. 6 chars)"
                            class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all placeholder:text-slate-300">
                        <button type="button" onclick="toggleNewPass()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-indigo-500 transition-colors">
                            <i id="eyeNewPass" class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
    
                    <!-- Strength hint -->
                    <p class="text-[10px] text-slate-400 font-medium pl-1">
                        <i class="fas fa-shield-alt mr-1 text-indigo-300"></i>
                        Use letters, numbers, and symbols for a strong password.
                    </p>
    
                    <!-- Verify Button -->
                    <button id="btnVerifyOTP" onclick="verifyOTP()"
                        class="w-full bg-green-600 hover:bg-green-700 active:scale-[0.98] text-white py-3 rounded-xl font-bold text-sm transition-all shadow-sm shadow-green-200">
                        Verify &amp; Reset Password
                    </button>
                </div>
    
            </div>
    
            <!-- FOOTER -->
            <div class="px-6 pb-5">
                <button onclick="closeForgotModal(); resetForgotModal();"
                    class="w-full text-slate-400 hover:text-slate-600 text-xs font-bold py-2 transition-colors">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const container = document.getElementById('mainContainer');
            const driverRaw = localStorage.getItem('driverInfo');
            if (driverRaw) {
                try {
                    const driver = JSON.parse(driverRaw);
                    if (driver && driver.client_id) {
                        window.location.replace('home.html');
                        return;
                    }
                } catch (e) { localStorage.removeItem('driverInfo'); }
            }
            container.style.opacity = '1';
        };

        function showVerifying(e) {
            document.getElementById('verifyingOverlay').style.display = 'flex';
        }

        window.hideVerifying = function() {
            document.getElementById('verifyingOverlay').style.display = 'none';
        }

        document.getElementById('togglePass').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
    <script src="IosAlert.js"></script>
    <script src="portal.js"></script>
</body>
</html>
